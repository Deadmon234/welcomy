<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WELCOMY - Organizer Interface</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-purple-900 text-white min-h-screen p-4">

  <!-- Header -->
  <header class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-3">
      <img src="https://img.icons8.com/ios-filled/50/ffffff/planner.png" class="w-8 h-8" alt="logo">
      <h1 class="text-2xl font-bold text-white">WELCOMY - Organizer</h1>
    </div>
    <div class="flex gap-2">
      <button class="bg-green-500 hover:bg-green-600 px-4 py-2 rounded text-sm">+ Add Guest</button>
      <button class="bg-indigo-500 hover:bg-indigo-600 px-4 py-2 rounded text-sm">View ASSO+ Status</button>
    </div>
  </header>

  <!-- Search -->
  <div class="mb-4">
    <input type="text" placeholder="Search guest..." class="w-full p-2 rounded bg-purple-800 text-white placeholder-gray-300" />
  </div>

  <!-- Guests Table -->
  <div class="overflow-x-auto">
    <table class="w-full table-auto bg-purple-800 rounded-lg overflow-hidden">
      <thead class="bg-purple-700 text-left">
        <tr>
          <th class="p-3">Name</th>
          <th class="p-3">Email</th>
          <th class="p-3">Phone</th>
          <th class="p-3">Presence</th>
          <th class="p-3">ASSO+ Installed</th>
          <th class="p-3 text-center">Actions</th>
        </tr>
      </thead>
      <tbody>

        <!-- Example Row -->
        <tr class="border-b border-purple-600">
            <td class="p-3">Sarah Tchienteu</td>
            <td class="p-3">sarah@example.com</td>
            <td class="p-3">+237 695123560</td>
          <td class="p-3 text-green-400">Present</td>
          <td class="p-3 text-green-400">Yes</td>
          <td class="p-3 flex flex-wrap gap-2 justify-center">
            <button class="bg-yellow-500 hover:bg-yellow-600 px-3 py-1 rounded text-sm">Edit</button>
            <button class="bg-red-600 hover:bg-red-700 px-3 py-1 rounded text-sm">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Hostesses Progress Section -->
<section class="mt-10">
    <h2 class="text-xl font-semibold mb-4 text-white">Hostess Progress</h2>
    
    <div class="space-y-4">
      <!-- Hostess Example -->
      <div class="bg-purple-800 p-4 rounded-lg shadow">
        <div class="flex justify-between items-center mb-2">
          <span class="font-medium">Hostess: Axel Ngeunou</span>
          <span class="text-sm text-gray-300">34 / 50 guests marked present</span>
        </div>
        <div class="w-full bg-purple-700 rounded-full h-3">
          <div class="bg-green-500 h-3 rounded-full" style="width: 68%;"></div>
        </div>
      </div>
  
      <div class="bg-purple-800 p-4 rounded-lg shadow">
        <div class="flex justify-between items-center mb-2">
          <span class="font-medium">Hostess:Alice Npam</span>
          <span class="text-sm text-gray-300">20 / 40 guests marked present</span>
        </div>
        <div class="w-full bg-purple-700 rounded-full h-3">
          <div class="bg-yellow-400 h-3 rounded-full" style="width: 50%;"></div>
        </div>
      </div>
  
      <!-- More hostess progress entries -->
    </div>
  </section>

</body>
</html>
