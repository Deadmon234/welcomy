<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liste des hôtesses</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-purple-900 text-white min-h-screen p-4 font-sans">
  <header class="flex flex-col md:flex-row items-center justify-between gap-4 mb-6">
    <div class="flex items-center gap-3">
      <svg class="w-8 h-8 text-white" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M16 7C16 9.20914 14.2091 11 12 11C9.79086 11 8 9.20914 8 7C8 4.79086 9.79086 3 12 3C14.2091 3 16 4.79086 16 7Z" fill="currentColor" />
        <path d="M19 9C20.6569 9 22 10.3431 22 12V13C22 14.6569 20.6569 16 19 16H5C3.34315 16 2 14.6569 2 13V12C2 10.3431 3.34315 9 5 9H19Z" fill="currentColor" />
        <path d="M7 18C7 15.7909 8.79086 14 11 14H13C15.2091 14 17 15.7909 17 18V19H7V18Z" fill="currentColor" />
      </svg>
      <div>
        <h1 class="text-2xl font-bold">Liste des hôtesses</h1>
        <p class="text-gray-300">Suivi des invités marqués présents par chaque hôtesse.</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <a href="dashboardOrganisateur.html" class="bg-green-500 hover:bg-green-600 px-5 py-2 rounded text-sm font-semibold">Retour</a>
    </div>
  </header>

  <div class="bg-purple-800 rounded-xl shadow-lg overflow-hidden">
    <table class="w-full table-auto">
      <thead class="bg-purple-700 text-left hidden md:table-header-group">
        <tr>
          <th class="p-4 text-white text-lg">Hôtesse</th>
          <th class="p-4 text-center text-white text-lg">Email</th>
          <th class="p-4 text-center text-white text-lg">Invités créés</th>
          <th class="p-4 text-center text-white text-lg">Présents</th>
        </tr>
      </thead>
      <tbody id="hotesseList"></tbody>
    </table>
  </div>

  <script>
    async function loadHostesses() {
      try {
        const resp = await fetch('../../../Backend/controllers/get_hotesse_listController.php');
        const data = await resp.json();
        const tbody = document.getElementById('hotesseList');
        tbody.innerHTML = '';

        (Array.isArray(data) ? data : []).forEach(hotesse => {
          const row = document.createElement('tr');
          row.className = 'border-b border-purple-700 flex flex-col md:table-row';
          row.innerHTML = `
            <td class="p-4 text-white text-xl font-semibold">${hotesse.nom}</td>
            <td class="p-4 text-center text-white">${hotesse.email}</td>
            <td class="p-4 text-center text-white">${hotesse.total_invites || 0}</td>
            <td class="p-4 text-center text-white">${hotesse.total_present || 0}</td>
          `;
          tbody.appendChild(row);
        });
      } catch (error) {
        console.error('Erreur chargement des hôtesses', error);
      }
    }

    loadHostesses();
  </script>
</body>
</html>
