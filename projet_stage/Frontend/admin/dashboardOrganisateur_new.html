<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WELCOMY - Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-purple-900 text-white min-h-screen p-4 font-sans">

  <header class="flex flex-col md:flex-row items-center justify-between gap-4 mb-6">
    <div class="flex items-center gap-3">
      <img src="https://img.icons8.com/ios-filled/50/ffffff/management.png" class="w-8 h-8" alt="logo">
      <div>
        <h1 class="text-2xl font-bold">WELCOMY - Admin</h1>
        <p class="text-gray-300">Gestion des invités, présences et export</p>
      </div>
    </div>
    <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
      <a href="../hotesse/ajouter_invite.html" class="bg-green-500 hover:bg-green-600 px-5 py-2 rounded text-sm font-semibold text-white text-center">
        + Ajouter un invité
      </a>
      <form action="../logout.php" method="POST">
        <button type="submit" class="bg-red-500 hover:bg-red-600 px-5 py-2 rounded text-sm font-semibold">
          Logout
        </button>
      </form>
    </div>
  </header>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
    <div class="bg-purple-800 p-5 rounded-xl shadow-lg">
      <h2 class="text-sm uppercase text-gray-400 mb-2">Invités totaux</h2>
      <p id="guestCount" class="text-4xl font-bold">0</p>
    </div>
    <div class="bg-purple-800 p-5 rounded-xl shadow-lg">
      <h2 class="text-sm uppercase text-gray-400 mb-2">Présents</h2>
      <p id="presentCount" class="text-4xl font-bold">0</p>
    </div>
    <div class="bg-purple-800 p-5 rounded-xl shadow-lg">
      <h2 class="text-sm uppercase text-gray-400 mb-2">Absents</h2>
      <p id="absentCount" class="text-4xl font-bold">0</p>
    </div>
  </div>

  <div class="mb-6">
    <input id="search" type="text" placeholder="Rechercher un invité..." class="w-full p-3 rounded bg-purple-800 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-400 transition" />
  </div>

  <div class="bg-purple-800 rounded-xl shadow-lg overflow-hidden">
    <table class="w-full table-auto">
      <thead class="bg-purple-700 text-left hidden md:table-header-group">
        <tr>
          <th class="p-4 text-white text-lg">Invité</th>
          <th class="p-4 text-center text-white text-lg">Email</th>
          <th class="p-4 text-center text-white text-lg">Téléphone</th>
          <th class="p-4 text-center text-white text-lg">Statut</th>
          <th class="p-4 text-center text-white text-lg">Actions</th>
        </tr>
      </thead>
      <tbody id="guestList"></tbody>
    </table>
  </div>

  <div class="mt-4 flex flex-col sm:flex-row gap-3">
    <button id="exportCsv" class="bg-blue-500 hover:bg-blue-600 px-5 py-3 rounded font-semibold text-white">Exporter CSV</button>
    <button id="refreshList" class="bg-indigo-500 hover:bg-indigo-600 px-5 py-3 rounded font-semibold text-white">Actualiser</button>
  </div>

  <script>
    const baseUrl = '../../../Backend/controllers';
    const searchInput = document.getElementById('search');
    const guestList = document.getElementById('guestList');
    const guestCount = document.getElementById('guestCount');
    const presentCount = document.getElementById('presentCount');
    const absentCount = document.getElementById('absentCount');
    const exportCsv = document.getElementById('exportCsv');
    const refreshList = document.getElementById('refreshList');
    let guests = [];

    async function loadGuests() {
      try {
        const response = await fetch(`${baseUrl}/get_invitesController.php`);
        const data = await response.json();
        guests = Array.isArray(data) ? data : [];
        renderGuests(guests);
        updateStats(guests);
      } catch (error) {
        console.error('Erreur lors de la récupération des invités :', error);
      }
    }

    function updateStats(data) {
      guestCount.innerText = data.length;
      presentCount.innerText = data.filter(invite => invite.statut === 'present').length;
      absentCount.innerText = data.filter(invite => invite.statut !== 'present').length;
    }

    function renderGuests(data) {
      guestList.innerHTML = '';
      data.forEach(invite => {
        const row = document.createElement('tr');
        row.className = 'border-b border-purple-700 flex flex-col md:table-row';
        row.innerHTML = `
          <td class="p-4 text-white text-xl font-semibold">${invite.nom}</td>
          <td class="p-4 text-center text-white">${invite.email || '-'}</td>
          <td class="p-4 text-center text-white">${invite.telephone || '-'}</td>
          <td class="p-4 text-center text-white">${invite.statut || 'absent'}</td>
          <td class="p-4 flex gap-3 justify-center md:justify-end">
            <button data-id="${invite.id_invite}" data-statut="present" class="statusBtn bg-green-500 hover:bg-green-600 text-sm px-4 py-2 rounded font-medium transition">Présent</button>
            <button data-id="${invite.id_invite}" data-statut="absent" class="statusBtn bg-yellow-500 hover:bg-yellow-600 text-sm px-4 py-2 rounded font-medium transition">Absent</button>
          </td>
        `;
        guestList.appendChild(row);
      });
      bindStatusButtons();
    }

    function bindStatusButtons() {
      document.querySelectorAll('.statusBtn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;
          const statut = btn.dataset.statut;
          try {
            await fetch(`${baseUrl}/mark_presentController.php`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
              body: `id_invite=${id}&statut=${statut}`
            });
            loadGuests();
          } catch (error) {
            console.error('Erreur lors de la mise à jour du statut :', error);
          }
        });
      });
    }

    function filterGuests() {
      const query = searchInput.value.toLowerCase();
      const filtered = guests.filter(invite => invite.nom.toLowerCase().includes(query));
      renderGuests(filtered);
      updateStats(filtered);
    }

    exportCsv.addEventListener('click', () => {
      const rows = [
        ['ID', 'Nom', 'Email', 'Téléphone', 'Statut'],
        ...guests.map(invite => [invite.id_invite, invite.nom, invite.email || '', invite.telephone || '', invite.statut || 'absent'])
      ];
      const csv = rows.map(row => row.map(value => `"${value}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.setAttribute('download', 'invites.csv');
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    });

    refreshList.addEventListener('click', loadGuests);
    searchInput.addEventListener('input', filterGuests);
    loadGuests();
  </script>
</body>
</html>
