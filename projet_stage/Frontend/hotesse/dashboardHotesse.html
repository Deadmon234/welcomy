<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WELCOMY - Hostess Interface</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-purple-900 text-white min-h-screen p-4 font-sans">

  <header class="flex flex-col md:flex-row items-center justify-between gap-4 mb-6">
    <div class="flex items-center gap-3">
      <img src="https://img.icons8.com/ios-filled/50/ffffff/conference-call.png" class="w-8 h-8" alt="logo">
      <h1 class="text-2xl font-bold text-white">WELCOMY - Hôtesse</h1>
    </div>
    <div class="flex items-center gap-3">
      <button id="openInviteModal" class="bg-green-500 hover:bg-green-600 px-5 py-2 rounded text-sm font-semibold">
        + Ajouter invité
      </button>
      <form action="../logout.php" method="POST">
        <button type="submit" class="bg-red-500 hover:bg-red-600 px-5 py-2 rounded text-sm font-semibold">
          Logout
        </button>
      </form>
    </div>
  </header>

  <div class="mb-4">
    <label class="block text-gray-300 mb-2">Événement :</label>
    <select id="eventSelect" class="w-full p-3 rounded bg-purple-800 text-white">
      <option value="" disabled selected>-- Sélectionner un événement --</option>
    </select>
  </div>

  <div class="mb-6">
    <input id="search" type="text" placeholder="Rechercher un invité..." class="w-full p-3 rounded bg-purple-800 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-400 transition" />
  </div>

  <div class="bg-purple-800 rounded-xl shadow-lg overflow-hidden">
    <table class="w-full table-auto">
      <thead class="bg-purple-700 text-left hidden md:table-header-group">
        <tr>
          <th class="p-4 text-white text-lg">Invité</th>
          <th class="p-4 text-center text-white text-lg">Statut</th>
          <th class="p-4 text-center text-white text-lg">Actions</th>
        </tr>
      </thead>
      <tbody id="guestList">
      </tbody>
    </table>
    <div id="hostessMessage" class="p-4 text-center text-gray-300">Sélectionnez un événement pour afficher les invités.</div>
  </div>

  <div id="inviteModal" class="fixed inset-0 hidden flex items-center justify-center bg-black/70 z-50 p-4">
    <div class="w-full max-w-xl bg-white rounded-2xl p-6 shadow-2xl text-slate-900">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h2 class="text-xl font-bold">Ajouter un invité</h2>
          <p class="text-sm text-slate-500">Remplissez les informations pour créer l'invitation.</p>
        </div>
        <button id="cancelInviteModal" class="text-slate-500 hover:text-slate-900">Annuler</button>
      </div>
      <form id="inviteForm" class="space-y-4">
        <input type="text" name="nom" placeholder="Nom complet" required class="w-full p-3 rounded-xl border border-slate-200">
        <input type="text" name="telephone" placeholder="Téléphone" required class="w-full p-3 rounded-xl border border-slate-200">
        <select id="eventSelectForm" name="event_id" class="w-full p-3 rounded-xl border border-slate-200 text-slate-700">
          <option value="">-- Aucun événement --</option>
        </select>
        <div class="flex items-center justify-between gap-3">
          <button type="submit" class="bg-purple-900 text-white px-5 py-3 rounded-xl hover:bg-purple-800">Enregistrer</button>
          <!-- <button type="button" id="cancelInviteModalBottom" class="text-sm text-slate-600 underline hover:text-slate-900">Annuler</button> -->
        </div>
      </form>
      <div id="message" class="text-sm mt-4"></div>
    </div>
  </div>

  <script>
    if (location.pathname.endsWith('dashboardHotesse.html')) {
      location.replace('dashboardHotesse.php');
    }
  </script>
  <script src="/welcomy/Backend/js/fetch_invites.js"></script>
  <script src="../../../Backend/js/add_invite.js"></script>
</body>
</html>
